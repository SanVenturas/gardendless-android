name: Gardendless Android Auto Build

on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC 0点运行
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gardendless-android
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Get pvzg_site Latest Tag Release
        id: get-latest-tag
        run: |
          # 获取最新tag（按创建时间排序，第一个即为最新）
          LATEST_TAG=$(curl -s https://api.github.com/repos/Gzh0821/pvzg_site/tags | jq -r '.[0].name')

          # 检查是否成功获取
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            echo "❌ 错误：无法获取最新的tag"
            echo "请检查："
            echo "1. 仓库地址是否正确：Gzh0821/pvzg_site"
            echo "2. 是否存在tag"
            echo "3. GitHub API访问是否正常"
            exit 1
          fi

          echo "✅ 成功获取最新tag: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Check Last Processed Tag
        id: check-tag
        run: |
          if [ -f "last_commit.txt" ]; then
            LAST_TAG=$(cat last_commit.txt)
            if [ "$LAST_TAG" == "${{ steps.get-latest-tag.outputs.tag }}" ]; then
              echo "No new tag, exiting."
              exit 1
            fi
          fi
          echo "Proceeding with new tag."

      - name: Download Release Asset
        run: |
          TAG="${{ steps.get-latest-tag.outputs.tag }}"
          ASSET_NAME="pvzge-${TAG}.zip"
          DOWNLOAD_URL="https://github.com/Gzh0821/pvzg_site/releases/download/${TAG}/${ASSET_NAME}"

          echo "⬇️ 正在下载: $DOWNLOAD_URL"
          curl -L -o pvzge_web-master.zip "$DOWNLOAD_URL"

          # 检查下载是否成功
          if [ ! -f "pvzge_web-master.zip" ] || [ ! -s "pvzge_web-master.zip" ]; then
            echo "❌ 错误：下载release资源失败"
            echo "请检查："
            echo "1. tag $TAG 是否存在对应的release"
            echo "2. release中是否包含 $ASSET_NAME"
            exit 1
          fi

          echo "✅ 下载完成: $ASSET_NAME"

      - name: Place Assets
        run: |
          mkdir -p app/src/main/assets
          mv pvzge_web-master.zip app/src/main/assets/pvzge_web-master.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Commit and Tag
        run: |
          TAG="${{ steps.get-latest-tag.outputs.tag }}"

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # 更新最后处理的tag记录
          echo "$TAG" > last_commit.txt
          git add last_commit.txt
          git commit -m "Auto update to $TAG (pvzg_site tag $TAG)" || echo "No changes to commit"

          # 创建并推送标签
          if [[ "$TAG" == v* ]]; then
            TAG_NAME="$TAG"
          else
            TAG_NAME="v$TAG"
          fi

          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin main --follow-tags
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Upload APK Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk
          tag_name: ${{ env.TAG_NAME }}
          name: "Build ${{ env.TAG_NAME }}"
          body: "Auto-generated release for ${{ env.TAG_NAME }}"
          token: ${{ secrets.GH_TOKEN || github.token }}
